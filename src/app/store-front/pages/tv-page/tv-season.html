<!-- Botón de regresar -->

@if (tvResource.isLoading()) {
  <div class="flex justify-center items-center h-screen">
    <span class="loading loading-spinner loading-lg text-accent"></span>
  </div>
}

@if (tvResource.hasValue()) {
  <h1 class="text-2xl text-center font-bold">
    <a
      class="btn btn-ghost text-xl pointer"
      (click)="goBack()"
      class="flex justify-end items-center gap-2"
    >
      <span class="text-secondary hover:text-primary cursor-pointer"> 🢨 Volver </span> </a
    >{{ tvResource.value().name }}
  </h1>
  <season-card [tv]="tvResource.value()" />
}
