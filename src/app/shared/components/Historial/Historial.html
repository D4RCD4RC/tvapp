<!-- Componente Botón con Lista Tailwind -->
<div class="relative inline-block text-left group">
  <!-- Botón -->
  <a class="cursor-pointer">
    <img
      src="/icon-time.png"
      alt="Historial de busquedas"
      class="h-10 w-10"
      title="Historial de busquedas"
    />
  </a>

  <!-- Lista desplegable (oculta por defecto, se muestra al pasar el mouse) -->
  <div
    class="origin-top-right absolute right-0 w-56 rounded-md shadow-lg bg-gray-500/30 backdrop-blur-md p-4 rounded-xl ring-1 ring-black ring-opacity-5 hidden group-hover:block"
  >
    <div class="py-2" role="menu">
      <span class="block px-4 py-2 text-xs font-semibold text-white uppercase">
        Búsquedas recientes
      </span>

      @for (item of searchService.history(); track item) {
        <button
          (click)="searchService.updateQuery(item)"
          class="w-full text-left text-gray-200 block px-4 py-3 text-sm hover:bg-primary hover:text-gray-200 transition-colors"
        >
          🎬 {{ item }}
        </button>
      } @empty {
        <p class="px-4 py-2 text-xs text-gray-400 italic">No hay búsquedas recientes</p>
      }

      @if (searchService.history().length > 0) {
        <div class="border-t border-gray-700 my-1"></div>
        <button
          (click)="searchService.clearHistory()"
          class="w-full text-pink-500 block px-4 py-2 text-xs text-center hover:bg-primary hover:text-white transition-colors"
        >
          Limpiar historial
        </button>
      }
    </div>
  </div>
</div>
